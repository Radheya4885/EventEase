<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Participant Dashboard - EventEase</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background-color: #f9f9f9;
            /* soft neutral background */
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 40px;
        }

        h1 {
            color: #6c5ce7;
            /* bright purple */
        }

        p {
            color: #555;
            margin-bottom: 20px;
        }

        .message {
            color: green;
            font-weight: bold;
        }

        a {
            display: inline-block;
            margin: 10px;
            padding: 10px 18px;
            text-decoration: none;
            background-color: #fd79a8;
            /* vibrant pink */
            color: white;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        a:hover {
            background-color: #ffeaa7;
            /* golden yellow hover */
            color: #333;
        }
    </style>
</head>

<body>

    <h1>Participant Dashboard</h1>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
    <p class="message">{{ message }}</p>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <p>Welcome! You can browse and join exciting events.</p>

    <div>
        <a href="/events">Browse Events</a>
        <a href="/logout">Logout</a>
    </div>

</body>

</html>
