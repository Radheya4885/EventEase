<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join EventEase - Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="auth-body">

    <div class="reg-card">
        <h2>Create Account</h2>
        <p class="subtitle">Join the EventEase community today.</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="message-box message-box--left">
            {% for message in messages %}
            • {{ message }}<br>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form action="/register" method="POST">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="enter your email address" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Min. 8 characters" required>
            </div>

            <div class="form-group">
                <label for="role">I want to join as a:</label>
                <select id="role" name="role">
                    <option value="participant">Participant (Attend events)</option>
                    <option value="organizer">Organizer (Host events)</option>
                    <option value="volunteer">Volunteer (Help out)</option>
                </select>
            </div>

            <button type="submit">Create Account</button>
        </form>

        <p class="footer-text">
            Already have an account? <a href="/login">Login</a>
        </p>

        <a href="/" class="back-link-sm">← Return to Home</a>
    </div>

</body>

</html>
